<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية التفاعلية</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2666/2666503.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        /* منع تداخل النصوص في الـ Charts */
        canvas { max-height: 300px; }
    </style>
</head>
<body>

    <div class="flex h-screen overflow-hidden">
        <div class="w-64 bg-slate-900 text-white flex flex-col">
            <div class="p-5 text-xl font-bold border-b border-slate-700 flex items-center gap-3">
                <i class="fa-solid fa-chart-pie text-blue-400"></i>
                <span>نظام المتابعة التفاعلي</span>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="switchTab('main-dashboard')" id="btn-main" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-blue-600 text-white transition-all text-right cursor-pointer">
                    <i class="fa-solid fa-house"></i> <span>التحليل العام</span>
                </button>
                <button onclick="switchTab('employee-dashboard')" id="btn-emp" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 transition-all text-right cursor-pointer">
                    <i class="fa-solid fa-user-tie"></i> <span>تحليل وأداء الموظفين</span>
                </button>
            </nav>
            <div class="p-4 border-t border-slate-700 text-xs text-slate-400 text-center">v2.0 - تحليل متقدم</div>
        </div>

        <div class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white shadow-sm p-4 flex flex-wrap justify-between items-center gap-4 sticky top-0 z-10">
                <h1 id="page-title" class="text-xl font-bold text-slate-800">التحليل العام للمبيعات والعملاء</h1>
                <div class="flex items-center gap-3 bg-slate-50 p-2 rounded-lg border border-slate-200">
                    <input type="date" id="date-from" class="border rounded p-1 text-sm bg-white">
                    <input type="date" id="date-to" class="border rounded p-1 text-sm bg-white">
                    <button onclick="applyFilters()" class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700 transition">تصفية</button>
                </div>
            </header>

            <div id="loader" class="flex-1 flex flex-col justify-center items-center p-10">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-3"></div>
            </div>

            <main id="dashboard-content" class="p-6 space-y-6 hidden">
                <div id="main-dashboard" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <p class="text-sm text-slate-500">إجمالي المبيعات</p>
                            <h3 id="kpi-total-sales" class="text-2xl font-bold">0</h3>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <p class="text-sm text-slate-500">عدد الطلبات</p>
                            <h3 id="kpi-total-leads" class="text-2xl font-bold">0</h3>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <p class="text-sm text-slate-500">معدل التحويل</p>
                            <h3 id="kpi-conv-rate" class="text-2xl font-bold">100%</h3>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                            <p class="text-sm text-slate-500">المحافظات</p>
                            <h3 id="kpi-won-leads" class="text-2xl font-bold">0</h3>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-white p-5 rounded-xl shadow-sm border"><canvas id="chartStatus"></canvas></div>
                        <div class="bg-white p-5 rounded-xl shadow-sm border"><canvas id="chartProducts"></canvas></div>
                    </div>
                </div>

                <div id="employee-dashboard" class="space-y-6 hidden">
                    <select id="emp-selector" onchange="handleEmployeeSelectionChange()" class="w-full p-3 rounded-lg border font-bold"></select>
                    <div id="employee-dynamic-section"></div>
                    <div class="bg-white p-5 rounded-xl shadow-sm border"><canvas id="chartEmpPerformance"></canvas></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        Chart.register(ChartDataLabels);
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzpCXaJZDPM_QdmKKj0lNXETIcYoQssnqS7B0tQcHooQ9iWDHVijqqnjl6XPZ6EJld4ig/exec";
        
        // إعدادات محسنة لمنع تداخل النصوص
        const chartOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                datalabels: { anchor: 'end', align: 'top', padding: 5 }
            },
            scales: { y: { beginAtZero: true, ticks: { padding: 10 } } }
        };

        // باقي منطق الـ JS الخاص بك هنا (Fetch, Render, etc...)
        // ملاحظة: تأكد من دمج دوال render الخاصة بك لتستخدم الـ chartOptions المحدثة أعلاه
    </script>
</body>
</html>
